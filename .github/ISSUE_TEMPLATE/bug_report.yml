name: Bug Report
description: Report a bug in Hermes IDE
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Hermes IDE version
      description: Which version are you running?
      placeholder: "e.g. 0.3.29"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      description: Your OS version (e.g. macOS 15.5, Windows 11 23H2, Ubuntu 24.04)
      placeholder: "e.g. macOS 15.5"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open Hermes IDE
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop screenshots here if applicable.
    validations:
      required: false

  - type: input
    id: ai-provider
    attributes:
      label: AI Provider
      description: Which AI provider were you using? (Claude, Gemini, Aider, Codex, Copilot, or N/A)
      placeholder: "e.g. Claude"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or logs here.
      render: shell
    validations:
      required: false
